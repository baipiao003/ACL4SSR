name: Update Clash Rules

on:
  push:
    branches:
      - clash
    paths:
      - 'rules/**'
      - 'zhenghe.py'
      - '.github/workflows/zhenghe.yml'
  
  workflow_dispatch:  # 允许手动触发
  
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点运行（北京时间8点）
  
  # 当规则仓库有更新时触发（通过 repository_dispatch 事件）
  repository_dispatch:
    types: [update-rules]

jobs:
  update-clash-rules:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run zhenghe.py
      id: run_script
      run: |
        echo "开始合并规则文件..."
        python zhenghe.py
        
        # 检查是否有新的规则生成
        echo "规则文件生成完成"
        echo "检查生成的规则文件..."
        ls -la Clash/
    
    - name: Check for changes
      id: check_changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 检查是否有文件变更
        if git diff --quiet Clash/; then
          echo "没有规则文件变更"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "检测到规则文件变更"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          
          # 显示变更内容
          echo "变更的文件:"
          git status --porcelain Clash/
        fi
    
    - name: Commit and push if changes exist
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        # 添加所有变更的规则文件
        git add Clash/
        
        # 获取时间戳
        TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
        
        # 获取提交信息
        COMMIT_MSG="🤖 自动更新规则文件 [$TIMESTAMP]"
        
        # 生成详细的提交信息
        echo "生成提交信息..."
        echo "## 更新的规则文件" > commit_msg.txt
        echo "" >> commit_msg.txt
        git diff --cached --name-only | while read file; do
          if [ -f "$file" ]; then
            rule_count=$(grep -v '^#' "$file" | grep -v '^$' | wc -l)
            file_size=$(stat -c%s "$file")
            echo "- **$(basename "$file")**: $rule_count 条规则 (${file_size}B)" >> commit_msg.txt
          fi
        done
        
        # 提交变更
        git commit -F commit_msg.txt
        
        # 推送到仓库
        git push origin main
        
        echo "规则文件已更新并提交到仓库"
        echo "提交信息:"
        cat commit_msg.txt
    
    - name: Create summary
      if: always()
      run: |
        echo "# 规则更新报告" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**运行状态:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # 获取生成的规则文件信息
        if [ -d "Clash" ]; then
          echo "## 生成的规则文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 文件名 | 规则数量 | 文件大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          
          for file in Clash/*.list; do
            if [ -f "$file" ]; then
              # 计算规则数量（排除注释和空行）
              rule_count=$(grep -v '^#' "$file" | grep -v '^$' | wc -l)
              file_size=$(stat -c%s "$file")
              file_name=$(basename "$file")
              echo "| $file_name | $rule_count | ${file_size}B |" >> $GITHUB_STEP_SUMMARY
            fi
          done
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 触发信息" >> $GITHUB_STEP_SUMMARY
        echo "- 触发事件: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- 触发分支: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        echo "- 触发时间: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- 提交哈希: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **规则文件已更新并提交**" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ steps.check_changes.outputs.has_changes }}" == "false" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏭️ **没有检测到规则变更**" >> $GITHUB_STEP_SUMMARY
        fi
        
        # 添加运行链接
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "[查看运行详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
