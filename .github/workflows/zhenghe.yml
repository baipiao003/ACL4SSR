name: Update Clash Rules

on:
  push:
    branches:
      - clash
    paths:
      - 'rules/**'
      - 'zhenghe.py'
      - '.github/workflows/update-rules.yml'
  
  workflow_dispatch:  # 允许手动触发
  
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点运行（北京时间8点）
  
  # 当规则仓库有更新时触发（通过 repository_dispatch 事件）
  repository_dispatch:
    types: [update-rules]

jobs:
  update-clash-rules:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run zhenghe.py
      id: run_script
      run: |
        echo "开始合并规则文件..."
        python zhenghe.py
        
        # 检查是否有新的规则生成
        echo "规则文件生成完成"
        echo "检查生成的规则文件..."
        ls -la Clash/
    
    - name: Check for changes
      id: check_changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 检查是否有文件变更
        if git diff --quiet Clash/; then
          echo "没有规则文件变更"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "检测到规则文件变更"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          
          # 显示变更内容
          echo "变更的文件:"
          git status --porcelain Clash/
        fi
    
    - name: Commit and push if changes exist
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        # 添加所有变更的规则文件
        git add Clash/
        
        # 获取时间戳
        TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
        
        # 提交变更
        git commit -m "🤖 自动更新规则文件 [$TIMESTAMP]"
        
        # 推送到仓库
        git push origin main
        
        echo "规则文件已更新并提交到仓库"
    
    - name: Create summary
      if: always()
      run: |
        echo "# 规则更新报告" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # 获取生成的规则文件信息
        if [ -d "Clash" ]; then
          echo "## 生成的规则文件" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 文件名 | 规则数量 | 文件大小 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          
          for file in Clash/*.list; do
            if [ -f "$file" ]; then
              # 计算规则数量（排除注释和空行）
              rule_count=$(grep -v '^#' "$file" | grep -v '^$' | wc -l)
              file_size=$(stat -c%s "$file")
              file_name=$(basename "$file")
              echo "| $file_name | $rule_count | ${file_size}B |" >> $GITHUB_STEP_SUMMARY
            fi
          done
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 触发信息" >> $GITHUB_STEP_SUMMARY
        echo "- 触发事件: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- 触发分支: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        echo "- 触发时间: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- 提交哈希: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 规则文件已更新并提交" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ steps.check_changes.outputs.has_changes }}" == "false" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏭️ 没有检测到规则变更" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: "🚨 规则更新失败",
            body: `规则更新工作流执行失败。\n\n请检查 ${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
          })
