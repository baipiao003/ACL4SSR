name: QuChong Clash Rules

on:
  push:
    paths:
      - 'Clash/**/*.list'
    branches: [ clash ]
  pull_request:
    paths:
      - 'Clash/**/*.list'
  schedule:
    - cron: '1 0 */3 * *'  # 每天凌晨3点运行
  workflow_dispatch:  # 手动触发

jobs:
  quchong:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Run quchong script
      run: |
        echo "开始运行Clash规则去重脚本..."
        echo "当前目录结构:"
        ls -la
        echo ""
        echo "Clash文件夹内容:"
        ls -la Clash/ || echo "Clash文件夹不存在"
        echo ""
        
        # 运行根目录下的quchong.py脚本
        python quchong.py Clash/
        echo "处理完成！"
        
    - name: Check for changes
      id: changes
      run: |
        echo "检查文件更改..."
        if git diff --quiet; then
          echo "no_changes=true" >> $GITHUB_OUTPUT
          echo "✅ 没有检测到更改"
        else
          echo "no_changes=false" >> $GITHUB_OUTPUT
          echo "📝 检测到文件更改:"
          git diff --name-only
        fi
        
    - name: Commit and push if changes
      if: steps.changes.outputs.no_changes == 'false'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Clash/
        git commit -m "chore: auto quchong Clash rules [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
