name: Clash Rules Auto Deduplication

on:
  push:
    paths:
      - 'Clash/**/*.list'
      - '.github/workflows/quchong.yml'
    branches: [ clash ]
  pull_request:
    paths:
      - 'Clash/**/*.list'
  schedule:
    - cron: '1 0 */3 * *'  # 每天凌晨3点运行
  workflow_dispatch:
    inputs:
      skip_commit:
        description: '跳过提交更改（测试）'
        required: false
        default: false
        type: boolean

jobs:
  deduplicate:
    name: Deduplicate Clash Rules
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: clash  # 明确指定分支
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Show repository info
      run: |
        echo "📦 仓库信息:"
        echo "事件: ${{ github.event_name }}"
        echo "分支: ${{ github.ref }}"
        echo "当前分支: $(git branch --show-current)"
        
    - name: Check Clash directory
      id: check_dir
      run: |
        echo "🔍 检查Clash文件夹..."
        if [ -d "Clash" ]; then
          LIST_COUNT=$(find Clash -name "*.list" -type f | wc -l)
          if [ $LIST_COUNT -gt 0 ]; then
            echo "✅ 找到Clash文件夹，包含 $LIST_COUNT 个.list文件"
            echo "has_list_files=true" >> $GITHUB_OUTPUT
            echo "list_count=$LIST_COUNT" >> $GITHUB_OUTPUT
            
            # 显示文件列表
            echo ""
            echo "📋 .list文件列表:"
            find Clash -name "*.list" -type f | sort
            
            # 统计规则数量（估算）
            echo ""
            echo "📊 规则数量估算:"
            for file in $(find Clash -name "*.list" -type f | head -5); do
              count=$(grep -v '^#' "$file" | grep -v '^$' | wc -l)
              echo "  $(basename "$file"): $count 条规则"
            done
          else
            echo "⚠️  Clash文件夹中没有.list文件"
            echo "has_list_files=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "❌ 未找到Clash文件夹"
          echo "has_list_files=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Run deduplication script
      id: run_script
      if: steps.check_dir.outputs.has_list_files == 'true'
      run: |
        echo "🚀 开始运行Clash规则去重脚本..."
        echo ""
        
        # 检查脚本是否存在
        if [ ! -f "quchong.py" ]; then
          echo "❌ quchong.py 脚本不存在"
          exit 1
        fi
        
        # 运行脚本
        echo "📝 运行命令: python quchong.py -y Clash/"
        echo ""
        
        python quchong.py -y Clash/
        
        EXIT_CODE=$?
        if [ $EXIT_CODE -eq 0 ]; then
          echo "✅ 脚本执行成功"
          echo "script_status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ 脚本执行失败，退出码: $EXIT_CODE"
          echo "script_status=failed" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        fi
        
    - name: Check for changes
      id: check_changes
      if: steps.run_script.outputs.script_status == 'success'
      run: |
        echo "🔍 检查文件更改..."
        
        # 检查git状态
        echo "当前git状态:"
        git status --short
        
        # 检查是否有未暂存的更改
        if git diff --quiet && git diff --cached --quiet; then
          echo "✅ 没有检测到更改"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "📝 检测到更改"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          
          # 显示详细的更改
          echo ""
          echo "📋 详细更改:"
          if ! git diff --quiet; then
            echo "工作区更改:"
            git diff --name-only
          fi
          if ! git diff --cached --quiet; then
            echo "暂存区更改:"
            git diff --cached --name-only
          fi
          
          # 统计Clash文件夹的更改
          CLASH_CHANGES=$(git status --short Clash/ 2>/dev/null || echo "")
          if [ -n "$CLASH_CHANGES" ]; then
            echo ""
            echo "📁 Clash文件夹更改:"
            echo "$CLASH_CHANGES"
          fi
        fi
        
    - name: Configure Git
      if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.skip_commit != 'true'
      run: |
        echo "⚙️ 配置Git..."
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git config --local pull.rebase false
        
    - name: Add and commit changes
      id: commit_changes
      if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.skip_commit != 'true'
      run: |
        echo "💾 添加并提交更改..."
        
        # 添加所有更改的文件
        echo "添加文件到暂存区..."
        git add -A
        
        # 检查是否有文件需要提交
        if git diff --cached --quiet; then
          echo "⚠️ 没有需要提交的更改"
          echo "commit_status=no_changes" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # 创建提交
        COMMIT_DATE=$(date +"%Y-%m-%d %H:%M:%S")
        COMMIT_MSG="chore: auto deduplicate Clash rules [skip ci]"
        COMMIT_MSG="$COMMIT_MSG\n\nDate: $COMMIT_DATE"
        
        # 添加更改统计
        echo ""
        echo "📊 更改统计:"
        git diff --cached --stat
        
        # 提交更改
        echo -e "\n📝 提交消息:"
        echo "$COMMIT_MSG"
        
        echo -e "$COMMIT_MSG" | git commit -F -
        
        if [ $? -eq 0 ]; then
          echo "✅ 提交成功"
          echo "commit_status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ 提交失败"
          echo "commit_status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi
        
    - name: Push changes
      if: steps.commit_changes.outputs.commit_status == 'success'
      run: |
        echo "🚀 推送更改到远程仓库..."
        
        # 获取当前分支
        CURRENT_BRANCH=$(git branch --show-current)
        echo "当前分支: $CURRENT_BRANCH"
        
        # 尝试推送
        MAX_RETRIES=3
        RETRY_COUNT=0
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          echo ""
          echo "尝试推送 (第 $((RETRY_COUNT+1)) 次)..."
          
          # 先拉取最新更改
          git pull origin $CURRENT_BRANCH --rebase --autostash
          
          # 推送更改
          if git push origin $CURRENT_BRANCH; then
            echo "✅ 推送成功"
            break
          else
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "⚠️ 推送失败，10秒后重试..."
              sleep 10
            else
              echo "❌ 推送失败，已达最大重试次数"
              exit 1
            fi
          fi
        done
    
    - name: Handle workflow failure
      if: failure()
      run: |
        echo "❌ 工作流执行失败"
        echo ""
        echo "🔧 故障排除步骤:"
        echo "1. 检查quchong.py脚本是否存在"
        echo "2. 检查Clash文件夹是否有.list文件"
        echo "3. 检查Git权限和配置"
        echo "4. 查看详细日志寻找具体错误"
