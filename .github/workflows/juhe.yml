name: Update Clash Rules

on:
  workflow_dispatch:  # 手动触发
    inputs:
      branch:
        description: '要更新的分支'
        required: false
        default: 'clash'
        type: choice
        options:
          - clash
          - main
          - master
  schedule:
    # 每天凌晨2点自动运行（UTC时间）
    - cron: '0 2 * * *'
  push:
    paths:
      - 'rules/**'  # 当rules文件夹内容变化时触发
    branches:
      - clash
      - main
      - master

jobs:
  update-clash-rules:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || 'clash' }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run juhe.py script
      run: |
        echo "开始更新Clash规则..."
        python juhe.py
        echo "规则更新完成！"
    
    - name: Check for changes
      id: git-check
      run: |
        if git diff --quiet; then
          echo "没有检测到更改"
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "检测到更改"
          echo "changes=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push if changes exist
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Clash/*.list
        git commit -m "🤖 自动更新Clash规则"
        git push origin ${{ github.event.inputs.branch || 'clash' }}
    
    - name: Upload rules as artifact
      uses: actions/upload-artifact@v4
      with:
        name: clash-rules
        path: Clash/*.list
        retention-days: 7
