name: delete old runs

on:
  schedule:
    - cron: '0 0 * * 0'  # 每 3 天 UTC 时间 00:00 运行
  workflow_dispatch:        # 允许手动触发

jobs:
  delete:
    name: delete old runs
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🗑️ 清理工作流记录
        uses: yxdz2020/delete-workflow-runs@v20251112
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 10  # 减少保留数量
