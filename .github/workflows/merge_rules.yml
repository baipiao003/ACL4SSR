# .github/workflows/merge_rules.yml
name: Merge Rules Only

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout clash
        uses: actions/checkout@v3
        with:
          ref: clash

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run merge script (with commit inside)
        run: python zhenghe.py
